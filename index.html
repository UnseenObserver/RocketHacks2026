<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyFirst</title>
  <link href="https://fonts.googleapis.com/css2?family=Margarine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>MoneyFirst</h1>
      <p class="subtitle">Your Personal Budget Tracker</p>
    </header>

    <!-- Tabs + Add Button -->
    <div class="tab-row">
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="dashboard" role="tab" aria-selected="true">Dashboard</button>
        <button class="tab" data-tab="history" role="tab" aria-selected="false">History</button>
        <button class="tab" data-tab="breakdown" role="tab" aria-selected="false">Breakdown</button>
      </nav>
      <button class="btn-add" id="open-add-modal">+ Add Transaction</button>
    </div>

    <!-- Dashboard Tab -->
    <div class="tab-panel" data-panel="dashboard">
      <!-- Summary Cards -->
      <section class="summary">
        <div class="card balance">
          <span class="card-label">Balance</span>
          <span class="card-amount" id="balance">$0.00</span>
        </div>
        <div class="card income">
          <span class="card-label">Total Income</span>
          <span class="card-amount" id="total-income">$0.00</span>
        </div>
        <div class="card expense">
          <span class="card-label">Total Expenses</span>
          <span class="card-amount" id="total-expense">$0.00</span>
        </div>
      </section>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Add Transaction</h2>
          <button class="modal-close" type="button" aria-label="Close" data-close="true">✕</button>
        </div>
        <form id="transaction-form">
          <div class="form-row">
            <div class="form-group">
              <label for="amount">Amount</label>
              <div class="amount-input">
                <span class="dollar-sign">$</span>
                <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
              </div>
            </div>
            <div class="form-group">
              <label for="description-select">Description</label>
              <select id="description-select">
                <option value="Salary">Salary</option>
                <option value="External">External</option>
                <option value="Others">Others</option>
              </select>
            </div>
            <div class="form-group" id="custom-description-group" style="display: none;">
              <label for="custom-description">Custom Description (Optional)</label>
              <input type="text" id="custom-description" placeholder="Enter custom description..." />
            </div>
            <div class="form-group">
              <label for="notes">Notes (Optional)</label>
              <textarea id="notes" placeholder="Add any notes..."></textarea>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" data-close="true">Cancel</button>
            <button type="submit" class="btn-add">+ Add Transaction</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Transaction History -->
    <div class="tab-panel" data-panel="history" hidden>
      <section class="history-section">
        <div class="history-header">
          <h2>Transaction History</h2>
          <button class="btn-clear" id="clear-btn">Clear All</button>
        </div>
        <ul id="transaction-list">
          <li class="empty-state">No transactions yet. Add one above!</li>
        </ul>
      </section>
    </div>

    <!-- Breakdown Tab -->
    <section class="breakdown-section tab-panel" data-panel="breakdown" hidden>
      <h2>Breakdown</h2>
      <p>Coming soon – this section will visualize Expenses, Income, and spend categories.</p>
    </section>
  </div>

  <script>
    const transactions = [];

    const form = document.getElementById('transaction-form');
    const list = document.getElementById('transaction-list');
    const clearBtn = document.getElementById('clear-btn');
    const modal = document.getElementById('add-modal');
    const openModalBtn = document.getElementById('open-add-modal');

    function toggleModal(show) {
      modal.hidden = !show;
      document.body.style.overflow = show ? 'hidden' : '';
      if (show) {
        document.getElementById('amount').focus();
      }
    }

    openModalBtn.addEventListener('click', () => toggleModal(true));

    modal.addEventListener('click', (event) => {
      if (event.target.closest('[data-close]')) {
        toggleModal(false);
      }
    });

    // Handle description select
    const descSelect = document.getElementById('description-select');
    const customDescGroup = document.getElementById('custom-description-group');
    const customDescInput = document.getElementById('custom-description');

    descSelect.addEventListener('change', () => {
      if (descSelect.value === 'Others') {
        customDescGroup.style.display = 'block';
      } else {
        customDescGroup.style.display = 'none';
      }
    });

    function formatCurrency(amount) {
      return '$' + amount.toFixed(2);
    }

    function updateSummary() {
      const income = transactions
        .filter(t => t.type === 'income')
        .reduce((sum, t) => sum + t.amount, 0);
      const expense = transactions
        .filter(t => t.type === 'expense')
        .reduce((sum, t) => sum + t.amount, 0);
      const balance = income - expense;

      const balanceEl = document.getElementById('balance');
      balanceEl.textContent = formatCurrency(balance);
      balanceEl.className = 'card-amount ' + (balance >= 0 ? 'positive' : 'negative');

      document.getElementById('total-income').textContent = formatCurrency(income);
      document.getElementById('total-expense').textContent = formatCurrency(expense);
    }

    function renderList() {
      if (transactions.length === 0) {
        list.innerHTML = '<li class="empty-state">No transactions yet. Add one above!</li>';
        return;
      }
      list.innerHTML = transactions.map((t, i) => `
        <li class="transaction-item ${t.type}">
          <div class="transaction-info">
            <span class="transaction-desc">${t.description}</span>
            <span class="transaction-category">${t.category}</span>
          </div>
          <div class="transaction-right">
            <span class="transaction-amount">${t.type === 'income' ? '+' : '-'}${formatCurrency(t.amount)}</span>
            <button class="btn-delete" onclick="deleteTransaction(${i})">✕</button>
          </div>
        </li>
      `).reverse().join('');
    }

    function deleteTransaction(index) {
      transactions.splice(index, 1);
      renderList();
      updateSummary();
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);
      const descSelectValue = document.getElementById('description-select').value;
      let description = descSelectValue;
      if (descSelectValue === 'Others') {
        description = document.getElementById('custom-description').value.trim();
      }
      const notes = document.getElementById('notes').value.trim();
      const type = (descSelectValue === 'Salary' || descSelectValue === 'External') ? 'income' : 'expense';
      const category = descSelectValue;

      if (!description || isNaN(amount) || amount <= 0) return;

      transactions.push({ description, amount, category, type, notes });
      renderList();
      updateSummary();
      form.reset();
      document.getElementById('custom-description-group').style.display = 'none';
      toggleModal(false);
    });

    clearBtn.addEventListener('click', function () {
      if (transactions.length === 0) return;
      if (confirm('Clear all transactions?')) {
        transactions.length = 0;
        renderList();
        updateSummary();
      }
    });

    // Tab switching
    const tabs = document.querySelectorAll('.tab');
    const panels = document.querySelectorAll('.tab-panel');

    function setActiveTab(tabKey) {
      tabs.forEach(tab => {
        const isActive = tab.dataset.tab === tabKey;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', isActive);
      });

      panels.forEach(panel => {
        panel.hidden = panel.dataset.panel !== tabKey;
      });
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => setActiveTab(tab.dataset.tab));
    });

    // Default view
    setActiveTab('dashboard');
  </script>
</body>
</html>
